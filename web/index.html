<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Horarios - Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-light">
  <main class="container py-4">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <header class="mb-4 text-center">
          <h1 class="mb-1">Gestor de Horarios</h1>
          <p class="text-muted">Agrega, consulta y borra tus clases con JavaScript y localStorage.</p>
        </header>

        <section class="card mb-3">
          <div class="card-body">
            <h2 class="h5">Agregar clase</h2>
            <form id="class-form" class="row g-2 align-items-end">
              <div class="col-md-4">
                <label for="class-name" class="form-label">Nombre</label>
                <input id="class-name" class="form-control" placeholder="Matemáticas" required />
              </div>
              <div class="col-md-3">
                <label for="class-day" class="form-label">Día</label>
                <input id="class-day" class="form-control" placeholder="Lunes" required />
              </div>
              <div class="col-md-3">
                <label for="class-time" class="form-label">Hora</label>
                <input id="class-time" class="form-control" placeholder="10:00-11:00" required />
              </div>
              <div class="col-md-2 d-grid">
                <button id="add-class-btn" type="submit" class="btn btn-primary">Agregar</button>
              </div>
            </form>
            <div id="form-error" class="form-text text-danger mt-2" aria-live="polite"></div>
          </div>
        </section>

        <section class="card">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h2 class="h5 mb-0">Mi horario</h2>
              <button id="clear-all-btn" class="btn btn-outline-danger btn-sm">Borrar todo</button>
            </div>
            <div id="classes-list" class="table-responsive"></div>
            <p id="empty-message" class="text-muted mt-2">No hay clases. Agrega tu primera clase arriba.</p>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
